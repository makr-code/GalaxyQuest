<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GalaxyQuest – Command Center</title>
  <link rel="stylesheet" href="css/style.css?v=20260328c" />
</head>
<body class="game-page">

  <!-- ── Top bar ───────────────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-left">
      <button id="topbar-title-btn" class="topbar-brand-btn" type="button" title="Daten aktualisieren">🌌 GalaxyQuest</button>
      <button id="topbar-home-btn" class="topbar-home-btn" type="button" title="Zum Heimatsystem springen">🏠 Home</button>
      <span id="topbar-coords" class="coords-badge"></span>
    </div>

    <!-- Window-launcher buttons -->
    <nav class="topbar-nav" aria-label="Open windows">
      <button class="nav-btn" data-win="overview">Overview</button>
      <button class="nav-btn" data-win="buildings">Buildings</button>
      <button class="nav-btn" data-win="research">Research</button>
      <button class="nav-btn" data-win="shipyard">Shipyard</button>
      <button class="nav-btn" data-win="fleet">Fleet</button>
      <button class="nav-btn" data-win="messages">
        Messages <span id="msg-badge" class="msg-badge hidden">0</span>
      </button>
      <button class="nav-btn" data-win="quests">
        Quests <span id="quest-badge" class="msg-badge hidden">0</span>
      </button>
      <button class="nav-btn" data-win="factions">🌐 Factions</button>
      <button class="nav-btn" data-win="leaders">👤 Leaders</button>
      <button class="nav-btn" data-win="leaderboard">Leaderboard</button>
      <button class="nav-btn" data-win="settings">⚙ Settings</button>
    </nav>

    <div class="topbar-right">
      <div class="topbar-search-wrap" id="topbar-search-wrap">
        <input id="topbar-search-input" class="topbar-search-input" type="search" placeholder="Sterne/Systeme suchen..." autocomplete="off" aria-label="Galaxy search" />
        <div id="topbar-search-overlay" class="topbar-search-overlay hidden" role="listbox" aria-label="Search results"></div>
      </div>
      <div class="user-menu-wrap" id="user-menu-wrap">
        <button id="commander-name" class="commander commander-btn" type="button" aria-expanded="false" aria-haspopup="menu"></button>
        <div id="user-menu" class="user-menu hidden" role="menu" aria-label="Benutzermen\u00fc"></div>
      </div>
      <button id="ui-console-toggle" class="btn btn-secondary btn-sm" type="button" title="UI-Konsole ein-/ausklappen">⌄ Console</button>
      <button id="audio-toggle-btn" class="btn btn-secondary btn-sm" type="button" title="Audio umschalten">🔊</button>
      <button id="logout-btn" class="btn btn-danger btn-sm">Logout</button>
    </div>
  </header>

  <section id="ui-console-panel" class="ui-console-panel hidden" aria-label="UI-Konsole">
    <div class="ui-console-head">
      <strong>UI Console</strong>
      <div class="ui-console-actions">
        <label for="ui-console-filter" class="ui-console-filter-label">Level</label>
        <select id="ui-console-filter" class="ui-console-filter" title="Log-Level filtern">
          <option value="all" selected>All</option>
          <option value="abort">Abort</option>
          <option value="error">Error</option>
          <option value="warn">Warn</option>
          <option value="info">Info</option>
          <option value="log">Log</option>
          <option value="debug">Debug</option>
          <option value="system">System</option>
        </select>
        <button id="ui-console-copy" class="btn btn-secondary btn-sm" type="button">Copy</button>
        <button id="ui-console-clear" class="btn btn-secondary btn-sm" type="button">Clear</button>
        <button id="ui-console-close" class="btn btn-secondary btn-sm" type="button">Close</button>
      </div>
    </div>
    <div id="ui-console-log" class="ui-console-log"></div>
    <div class="ui-console-input-row">
      <input id="ui-console-input" type="text" placeholder="help | refresh | home | open settings | transitions on/off | msg <user> <text>" />
      <button id="ui-console-run" class="btn btn-primary btn-sm" type="button">Run</button>
    </div>
  </section>

  <!-- ── Resource bar ──────────────────────────────────────────────────────── -->
  <div class="resource-bar">
    <div class="resource metal" title="Metal">
      <span class="res-icon">⬡</span>
      <span class="res-label">Metal</span>
      <span id="res-metal" class="res-value">—</span>
    </div>
    <div class="resource crystal" title="Crystal">
      <span class="res-icon">💎</span>
      <span class="res-label">Crystal</span>
      <span id="res-crystal" class="res-value">—</span>
    </div>
    <div class="resource deuterium" title="Deuterium">
      <span class="res-icon">🔵</span>
      <span class="res-label">Deuterium</span>
      <span id="res-deuterium" class="res-value">—</span>
    </div>
    <div class="resource food" title="Food stockpile – needed to feed population">
      <span class="res-icon">🌾</span>
      <span class="res-label">Food</span>
      <span id="res-food" class="res-value">—</span>
    </div>
    <div class="resource rare-earth" title="Rare Earth – advanced manufacturing resource">
      <span class="res-icon">💜</span>
      <span class="res-label">Rare Earth</span>
      <span id="res-rare-earth" class="res-value">—</span>
    </div>
    <div class="resource population" title="Colony population">
      <span class="res-icon">👥</span>
      <span class="res-label">Pop</span>
      <span id="res-population" class="res-value">—</span>
    </div>
    <div class="resource happiness" title="Happiness – affects worker productivity">
      <span class="res-icon">😊</span>
      <span class="res-label">Happy</span>
      <span id="res-happiness" class="res-value">—</span>
    </div>
    <div class="resource energy" title="Energy">
      <span class="res-icon">⚡</span>
      <span class="res-label">Energy</span>
      <span id="res-energy" class="res-value">—</span>
    </div>
    <div class="resource dark-matter" title="Dark Matter – prestige currency earned from quests">
      <span class="res-icon">◆</span>
      <span class="res-label">Dark Matter</span>
      <span id="res-dark-matter" class="res-value">0</span>
    </div>

    <!-- Planet selector -->
    <div class="planet-selector">
      <label for="planet-select">Planet:</label>
      <select id="planet-select"></select>
    </div>
  </div>

  <!-- ── WM Desktop (windows float here) ──────────────────────────────────── -->
  <div id="wm-desktop" class="wm-desktop" aria-label="Game desktop"></div>

  <!-- ── WM Taskbar (minimised windows) ───────────────────────────────────── -->
  <div id="wm-taskbar" class="wm-taskbar" aria-label="Open windows">
    <span class="wm-taskbar-label">Windows:</span>
    <div id="footer-load" class="footer-load hidden" role="status" aria-live="polite">
      <span id="footer-load-label" class="footer-load-label">Lade Daten…</span>
      <div class="footer-load-track" aria-hidden="true">
        <div id="footer-load-bar" class="footer-load-bar"></div>
      </div>
      <span id="footer-load-queue" class="footer-load-queue">Q:0|F:0|C:0</span>
      <span id="footer-network-status" class="footer-net footer-net-unknown">NET: ?</span>
      <span id="footer-load-pct" class="footer-load-pct">0%</span>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast hidden" role="status" aria-live="assertive"></div>

  <script src="js/terminal.js?v=20260328a"></script>
  <script src="js/starfield.js?v=20260327w"></script>
  <script src="js/wm.js?v=20260327w"></script>
  <script src="js/binary-decoder.js?v=20260328a"></script>
  <script src="js/binary-decoder-v2.js?v=20260328a"></script>
  <script src="js/binary-decoder-v3.js?v=20260328b"></script>
  <script src="js/api.js?v=20260328c"></script>
  <script src="https://cdn.jsdelivr.net/npm/dexie@4.0.8/dist/dexie.min.js"></script>
  <script src="js/galaxy-model.js?v=20260327w"></script>
  <script src="js/galaxy-db.js?v=20260327w"></script>
  <script src="js/audio.js?v=20260328ah"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="js/planet-textures.js?v=20260328a"></script>
  <script src="js/galaxy3d.js?v=20260328m"></script>
  <script src="js/game.js?v=20260328t"></script>
</body>
</html>
