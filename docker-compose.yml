services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: galaxyquest-web
    depends_on:
      db:
        condition: service_healthy
      tts:
        condition: service_started
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: galaxyquest
      DB_USER: galaxyquest_user
      DB_PASS: galaxyquest_dev
      DB_CHARSET: utf8mb4
      NPC_LLM_CONTROLLER_ENABLED: 1
      NPC_LLM_CONTROLLER_TIMEOUT_SECONDS: 8
      NPC_LLM_CONTROLLER_COOLDOWN_SECONDS: 900
      NPC_LLM_CONTROLLER_MIN_CONFIDENCE: 0.55
      GAME_SPEED: 1
      SESSION_LIFETIME: 3600
      XDEBUG_MODE: develop,debug
      XDEBUG_CONFIG: client_host=host.docker.internal client_port=9003 idekey=VSCODE
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      SWARMUI_BASE_URL: http://host.docker.internal:7801
      TTS_ENABLED: 1
      TTS_SERVICE_URL: http://tts:5500
      # ThemisDB – Phase 0 dual-write (disabled by default; enable when themisdb profile is active)
      THEMISDB_ENABLED: 0
      THEMISDB_BASE_URL: http://themisdb:8080
      THEMISDB_TIMEOUT_SECONDS: 10
      THEMISDB_DUAL_WRITE: 0
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html

  db:
    image: mysql:8.4
    container_name: galaxyquest-db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: galaxyquest
      MYSQL_USER: galaxyquest_user
      MYSQL_PASSWORD: galaxyquest_dev
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "3307:3306"
    volumes:
      - galaxyquest-db-data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - ./sql/migrate_vessel_blueprints_v1.sql:/docker-entrypoint-initdb.d/010-vessel-bp-v1.sql:ro
      - ./sql/migrate_vessel_blueprints_v2.sql:/docker-entrypoint-initdb.d/011-vessel-bp-v2.sql:ro
      - ./sql/migrate_vessel_blueprints_v3.sql:/docker-entrypoint-initdb.d/012-vessel-bp-v3.sql:ro
      - ./sql/migrate_vessel_blueprints_v4.sql:/docker-entrypoint-initdb.d/013-vessel-bp-v4.sql:ro
      - ./sql/migrate_vessel_blueprints_v5.sql:/docker-entrypoint-initdb.d/014-vessel-bp-v5.sql:ro
      - ./sql/migrate_vessel_blueprints_v6_planetary_events.sql:/docker-entrypoint-initdb.d/015-vessel-bp-v6.sql:ro
      - ./sql/migrate_vessel_blueprints_v7_research_phase5.sql:/docker-entrypoint-initdb.d/016-vessel-bp-v7.sql:ro
      - ./sql/migrate_vessel_blueprints_v8_wormholes.sql:/docker-entrypoint-initdb.d/017-vessel-bp-v8.sql:ro
      - ./sql/migrate_vessel_blueprints_v9_wormhole_beacons.sql:/docker-entrypoint-initdb.d/018-vessel-bp-v9.sql:ro
      - ./sql/migrate_security_v1.sql:/docker-entrypoint-initdb.d/019-security-v1.sql:ro
      - ./sql/migrate_security_v2_totp.sql:/docker-entrypoint-initdb.d/020-security-v2-totp.sql:ro
      - ./sql/migrate_admin_user_crud_v1.sql:/docker-entrypoint-initdb.d/021-admin-user-crud-v1.sql:ro
      - ./sql/migrate_actor_model_v1.sql:/docker-entrypoint-initdb.d/022-actor-model-v1.sql:ro
      - ./sql/migrate_faction_species_v1.sql:/docker-entrypoint-initdb.d/023-faction-species-v1.sql:ro
      - ./sql/migrate_actor_model_v2_drop_is_npc.sql:/docker-entrypoint-initdb.d/024-actor-model-v2-drop-is-npc.sql:ro
      - ./sql/migrate_tts_v1.sql:/docker-entrypoint-initdb.d/025-tts-v1.sql:ro

  tts:
    build:
      context: ./tts_service
      dockerfile: Dockerfile
    container_name: galaxyquest-tts
    environment:
      TTS_ENGINE: piper
      TTS_DEFAULT_VOICE: de_DE-thorsten-high
      TTS_MAX_CHARS: 2000
      # TTS_SECRET: change_me_in_production
    ports:
      - "5500:5500"
    volumes:
      - galaxyquest-tts-voice-cache:/app/voice_cache
      - galaxyquest-tts-audio-cache:/app/audio_cache

  # ── ThemisDB (Phase 0: parallel to MySQL for dual-write PoC) ──────────────
  # ThemisDB COMMUNITY edition – multi-model database with native LLM support.
  # Ports:
  #   8090  → HTTP/REST/GraphQL API  (maps to internal 8080, avoids conflict with web:8080)
  #   18765 → Binary Wire / gRPC
  #   4318  → OpenTelemetry / Prometheus metrics
  # Set THEMISDB_ENABLED=1 in the web service environment to activate dual-write.
  themisdb:
    image: themisdb/themisdb:latest
    container_name: galaxyquest-themisdb
    profiles:
      - themisdb          # opt-in: start with `docker compose --profile themisdb up`
    environment:
      THEMIS_HTTP_PORT: 8080
      THEMIS_WIRE_PORT: 18765
      THEMIS_METRICS_PORT: 4318
      THEMIS_DATA_DIR: /data
      THEMIS_LOG_LEVEL: info
      THEMIS_EDITION: community
      # LLM integration – mount a models/ directory and set the path here.
      THEMIS_LLM_ENABLED: 0
      THEMIS_LLM_MODEL_DIR: /models
    ports:
      - "8090:8080"
      - "18765:18765"
      - "4318:4318"
    volumes:
      - galaxyquest-themisdb-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── ThemisDB schema provisioner ──────────────────────────────────────────────
  # Runs once after ThemisDB is healthy: creates all collections, indexes, graph
  # definitions and seed data that mirror the MySQL schema.
  # MySQL parallel: sql/schema.sql + sql/migrate_*.sql → themis_schema_provision.php
  #
  # Automatically runs when starting with the 'themisdb' profile:
  #   docker compose --profile themisdb up
  themisdb-init:
    image: php:8.3-cli
    container_name: galaxyquest-themisdb-init
    profiles:
      - themisdb
    depends_on:
      themisdb:
        condition: service_healthy
    environment:
      # Mirror the web service ThemisDB settings
      THEMISDB_ENABLED:         1
      THEMISDB_BASE_URL:        http://themisdb:8080
      THEMISDB_TIMEOUT_SECONDS: 30
      THEMISDB_DUAL_WRITE:      0
      THEMISDB_API_TOKEN:       ""
    volumes:
      - ./:/app:ro          # mount repo read-only
    working_dir: /app
    # Provision schema + seed data, then exit (restart: no)
    command: >
      sh -c "php tools/themis_schema_provision.php
               --url=http://themisdb:8080
               --seed
               && echo '[themisdb-init] Schema provisioning complete.'"
    restart: "no"

volumes:
  galaxyquest-db-data:
  galaxyquest-tts-voice-cache:
  galaxyquest-tts-audio-cache:
  galaxyquest-themisdb-data: