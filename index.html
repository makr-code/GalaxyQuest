<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GalaxyQuest – Space Strategy MMO</title>
  <link rel="stylesheet" href="css/style.css?v=20260327w" />
</head>
<body class="auth-page">
  <!-- Starfield background -->
  <canvas id="starfield"></canvas>

  <div class="auth-wrapper">
    <div class="auth-logo">
      <div class="logo-icon">🌌</div>
      <h1 class="logo-title">GalaxyQuest</h1>
      <p class="logo-subtitle">Conquer the Stars</p>
    </div>

    <!-- Tab bar -->
    <div class="auth-tabs">
      <button class="tab-btn active" data-tab="login">Login</button>
      <button class="tab-btn" data-tab="register">Register</button>
    </div>

    <!-- Login form -->
    <form id="login-form" class="auth-form" autocomplete="on">
      <div class="form-group">
        <label for="login-username">Commander Name</label>
        <input id="login-username" type="text" name="username" required
               autocomplete="username" placeholder="Your username" />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" name="password" required
               autocomplete="current-password" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>
          <input id="login-remember" type="checkbox" name="remember" value="1" />
          Keep me signed in
        </label>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Enter the Galaxy</button>
      <div id="login-error" class="form-error" aria-live="polite"></div>
    </form>

    <div id="dev-auth-tools" class="auth-form hidden" aria-live="polite">
      <h3>Dev Tools</h3>
      <p style="margin-top:0">Local-only password reset for test users.</p>
      <div class="form-group">
        <label for="dev-reset-username">Username</label>
        <input id="dev-reset-username" type="text" placeholder="default_user" />
      </div>
      <div class="form-group">
        <label for="dev-reset-password">New Password</label>
        <input id="dev-reset-password" type="password" minlength="8" placeholder="New password" />
      </div>
      <button id="dev-reset-btn" type="button" class="btn btn-danger btn-full">Reset Password (Dev)</button>
      <div id="dev-reset-result" class="form-error" aria-live="polite"></div>
    </div>

    <!-- Register form -->
    <form id="register-form" class="auth-form hidden" autocomplete="on">
      <div class="form-group">
        <label for="reg-username">Commander Name</label>
        <input id="reg-username" type="text" name="username" required
               autocomplete="username" pattern="[A-Za-z0-9_]{3,32}"
               title="3-32 alphanumeric characters or underscores"
               placeholder="Choose a unique name" />
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input id="reg-email" type="email" name="email" required
               autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input id="reg-password" type="password" name="password" required
               autocomplete="new-password" minlength="8"
               placeholder="Min 8 characters" />
      </div>
      <div class="form-group">
        <label>
          <input id="reg-remember" type="checkbox" name="remember" value="1" />
          Keep me signed in
        </label>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Launch into the Galaxy</button>
      <div id="register-error" class="form-error" aria-live="polite"></div>
    </form>
  </div>

  <script src="js/terminal.js?v=20260328a"></script>
  <script src="js/starfield.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
