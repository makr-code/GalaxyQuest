# ═══════════════════════════════════════════════════════════════════════════════
# KONFLIKT-TRIGGER & ESKALATIONSMECHANIKEN
# ═══════════════════════════════════════════════════════════════════════════════

conflict_triggers:
  resource_scarcity:
    - "Wenn Kristall-Ressourcen unter 30% fallen → Zhareen-Zorn"
    - "Wenn Energie-Produktion unter 40% fällt → Aereth-Aggression"
    - "Wenn Schwarm-Reproduktion blockiert → Kryl'Tha-Offensiv"
    
  territorial_violation:
    - "Iron Fleet betritt Konvergenz-Sektor → Kriegserklärung"
    - "Echos der Leere expandiert um >20% → Notfalltreffen"
    - "Piraten überfallen heilige Stätte → Architekten-Bestrafung"
    
  diplomatic_breakdown:
    - "Wenn Beziehung unter -5 fällt → Waffenembargo"
    - "Wenn Beziehung unter -8 fällt → Kriegserklärung möglich"
    - "Wenn Beziehung über +8 steigt → Militärbündnis"
    
  espionage_discovery:
    - "Vel'Ar-Spion entdeckt → -3 Standing mit betroffener Fraktion"
    - "Vel'Ar beim Diebstahl erwischt → -5 Standing + möglicher Krieg"
    
  void_expansion:
    - "Echos der Leere verschlingt Welt → Alle Fraktionen alarmiert"
    - "Riss wird 50% größer → Notfall-Konvergenz-Rat"
    - "Leerenbrut erreicht Pilgrim-Sektor → Ultimativos Bündnis"

# ═══════════════════════════════════════════════════════════════════════════════
# DIPLOMATIE-EVENTS & SPIELER-EINFLUSS
# ═══════════════════════════════════════════════════════════════════════════════

diplomatic_events:
  peace_summit:
    participants: [vor_tak, syl_nar, zhareen]
    difficulty: "hard"
    player_influence: "high"
    consequences: "Könnte Allianz spalten oder stärken"
    
  trade_embargo_vote:
    participants: [helion_confederation, alle]
    difficulty: "medium"
    player_influence: "medium"
    target: "iron_fleet"
    consequences: "Menschliche Expansion verlangsamen"
    
  cult_investigation:
    participants: [architekten_des_lichts, vel_ar, syl_nar]
    difficulty: "high"
    player_influence: "high"
    consequences: "Aethernox-Geheimnis enthüllen oder vertuschen"
    
  void_summit_emergency:
    participants: "alle"
    difficulty: "extreme"
    player_influence: "extreme"
    consequences: "Entscheidung über gemeinsame Strategie gegen Leerenbrut"
    options:
      - "Allianz-Option: Vereinigung gegen Echos"
      - "Spaltungs-Option: Jede Fraktion für sich"
      - "Opfer-Option: Opfere eine Fraktion für die anderen"

# ═══════════════════════════════════════════════════════════════════════════════
# AI-GESTÜTZTE DYNAMISCHE EVENTS
# ═══════════════════════════════════════════════════════════════════════════════

dynamic_ai_events:
  reputation_decay:
    description: "Beziehungen verschlechtern sich mit Inaktivität"
    decay_rate: -0.1  # pro Spielstunde
    
  opportunity_for_betrayal:
    description: "Wenn Standing zwischen zwei Fraktionen stark divergiert, können sie verhandelt werden"
    threshold: 10  # Differenz zwischen standings
    
  faction_fragmentation:
    description: "Wenn Fraktion intern gespalten ist, können Splitter-Fraktionen entstehen"
    trigger: "innerer_konflikt > 0.7"
    
  alliance_formation:
    description: "Wenn zwei Fraktionen Standing >+7 haben, können sie Bündnis formieren"
    auto_trigger: true
    player_notification: "high"
    
  economic_collapse:
    description: "Wenn Handelsnetzwerk fragmentiert, können Fraktionen kollabieren"
    trigger: "trade_routes < 30%"
    consequences: "massive_standing_shifts"

# ═══════════════════════════════════════════════════════════════════════════════
# ENDGAME-SZENARIEN
# ═══════════════════════════════════════════════════════════════════════════════

endgame_scenarios:
  convergence_united:
    condition: "Alle 6 Hauptfaktionen haben Standing >+5"
    outcome: "Vereinigte Front gegen Leerenbrut"
    difficulty: "medium"
    
  convergence_split:
    condition: "Hauptfaktionen haben durchschnittliches Standing <-2"
    outcome: "Konvergenz zerfällt in Bürgerkrieg"
    difficulty: "extreme"
    
  human_dominance:
    condition: "Iron Fleet kontrolliert 40% des Sektors"
    outcome: "Menschliche Übernahme"
    difficulty: "extreme"
    
  void_consumption:
    condition: "Echos der Leere kontrolliert 50% des Sektors"
    outcome: "Dimensionaler Kollaps"
    difficulty: "extreme"
    
  ai_ascendance:
    condition: "Omniscienta + Aethernox > 70% Kontrolle"
    outcome: "Post-organische Übernahme"
    difficulty: "extreme"
    
  hivemind_symbiosis:
    condition: "Brut der Ewigkeit schliesst Friedensvertrag mit 4+ Fraktionen"
    outcome: "Neue Stammgast-Ordnung"
    difficulty: "hard"

