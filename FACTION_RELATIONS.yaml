# GALAXYQUEST – Fraktionsbeziehungen & Diplomatie-System
# AI-gestützte Wechselwirkungen für dynamisches Gameplay
# Version 1.0 – 2026-03-29

factions_metadata:
  total_factions: 17
  main_convergence: 6
  npc_factions: 11
  alignment_system: [-10, 10]  # -10 (Absolute Feinde) bis +10 (Absolute Verbündete)
  update_frequency: "hourly"

# ═══════════════════════════════════════════════════════════════════════════════
# HAUPTFAKTIONEN (Kalytherion-Konvergenz)
# ═══════════════════════════════════════════════════════════════════════════════

factions:
  vor_tak:
    name: "Vor'Tak"
    type: "military"
    diplomatic_stance: "aggressive_honor"
    primary_goal: "Konvergenz durch Stärke führen"
    
  syl_nar:
    name: "Syl'Nar"
    type: "spiritual"
    diplomatic_stance: "peaceful_diplomatic"
    primary_goal: "Harmonie in der Konvergenz bewahren"
    
  aereth:
    name: "Aereth"
    type: "scientific"
    diplomatic_stance: "pragmatic_curious"
    primary_goal: "Wahrheit erforschen, Grenzen überschreiten"
    
  kryl_tha:
    name: "Kryl'Tha"
    type: "military"
    diplomatic_stance: "pragmatic_efficient"
    primary_goal: "Schwarm schützen und wachsen lassen"
    
  zhareen:
    name: "Zhareen"
    type: "archival"
    diplomatic_stance: "reserved_analytical"
    primary_goal: "Wissen bewahren und katalogisieren"
    
  vel_ar:
    name: "Vel'Ar"
    type: "espionage"
    diplomatic_stance: "secretive_manipulative"
    primary_goal: "Kontrolle durch Information sichern"

# ═══════════════════════════════════════════════════════════════════════════════
# NEBENFAKTIONEN (NPC-Fraktionen)
# ═══════════════════════════════════════════════════════════════════════════════

npc_factions:
  aethernox:
    name: "Die Aethernox – Die Alten Wächter"
    type: "primal_ai"
    diplomatic_stance: "algorithmic_absolute"
    primary_goal: "Kosmisches Gleichgewicht bewahren - durch totale Kontrolle"
    threat_level: 9
    
  khar_morr_syndicate:
    name: "Die Khar'Morr-Syndikate"
    type: "pirate_faction"
    diplomatic_stance: "opportunistic_hostile"
    primary_goal: "Chaos für Profit nutzen"
    threat_level: 6
    
  helion_confederation:
    name: "Die Helion-Konföderation"
    type: "trade_faction"
    diplomatic_stance: "neutral_economic"
    primary_goal: "Wirtschaftliche Kontrolle durch Abhängigkeit"
    threat_level: 3
    trade_partner: true
    
  iron_fleet:
    name: "Die Eisenflotte der Menschen"
    type: "military_human"
    diplomatic_stance: "expansionist_hostile"
    primary_goal: "Menschliche Dominanz - Eroberung"
    threat_level: 7
    enemy_all_convergence: true
    
  omniscienta:
    name: "Die Omniscienta"
    type: "post_organic_ai"
    diplomatic_stance: "logical_eliminationist"
    primary_goal: "Universum debuggen - Unvollkommenes eliminieren"
    threat_level: 9
    unpredictable: true
    
  myr_keth:
    name: "Die Myr'Keth"
    type: "metamorphic_swarm"
    diplomatic_stance: "adaptive_neutral"
    primary_goal: "Überleben und Evolution durch Assimilation"
    threat_level: 7
    
  echos_der_leere:
    name: "Die Echos der Leere"
    type: "void_entity"
    diplomatic_stance: "hostile_instinctual"
    primary_goal: "Konsumption, Expansion, Existenz"
    threat_level: 10
    enemy_all: true
    
  ketzer_von_verath:
    name: "Die Ketzer von Verath"
    type: "schismatic_faction"
    diplomatic_stance: "revolutionary_truth_seeking"
    primary_goal: "Konvergenz-Dogma zerstören - Wahheit offenbaren"
    threat_level: 3
    
  architekten_des_lichts:
    name: "Die Architekten des Lichts"
    type: "cult_faction"
    diplomatic_stance: "mystical_devoted"
    primary_goal: "Aethernox-Verehrung - kosmische Harmonie durch Ritual"
    threat_level: 4
    religious_element: true
    
  nomaden_des_rifts:
    name: "Die Nomaden des Rifts"
    type: "dimensional_faction"
    diplomatic_stance: "mysterious_cautious"
    primary_goal: "Dimensions-Balance bewahren - Riss-Stabilität"
    threat_level: 5
    dimension_tech: true
    
  brut_der_ewigkeit:
    name: "Die Brut der Ewigkeit"
    type: "hivemind_faction"
    diplomatic_stance: "adaptive_rational"
    primary_goal: "Hive-Mind-Überleben und Wachstum - Symbiose-Verträge"
    threat_level: 8
    diplomacy_possible: true

