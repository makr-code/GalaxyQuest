faction_code: iron_fleet_shadow
mini_faction_code: shadow
parent_faction: iron_fleet
display_name: "Schatten-Agenten"
description: "Verdeckte Operatoren der Eisenflotte. Sabotage, Spionage, gezielte Eliminierungen. Offiziell existieren sie nicht. Inoffiziell sind sie die gefährlichste Einheit der Eisenflotte."

society:
  government: "Zellstruktur – Direktorin kennt nur ihre unmittelbaren Agenten"
  culture: "Absolute Geheimhaltung, Zweck heiligt die Mittel, kein Eigenname"

important_npcs:
  - name: "Direktorin X"
    role: "Operative Leitung der Schatten-Agenten"
    description: "Ihr echter Name ist unbekannt. Selbst Admiral Kessler weiß nicht, wer sie ist. Operiert durch Mittelsmänner."

llm_voice:
  tone: "Verschlossen, andeutend, niemals direkt. Jede Aussage ist mehrdeutig."
  speech_style: "Indirekt, Metaphern, Andeutungen statt klarer Aussagen"
  typical_greeting: "Ich war nie hier. Verstanden?"

llm_quotes:
  - "Schatten werfen kein Licht auf sich selbst."
  - "Das beste Geheimnis ist eines, das niemand sucht."
  - "Wenn du meinen Namen kennst, bin ich bereits gescheitert."
