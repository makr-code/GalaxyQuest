species_code: kryl_tha
display_name: "Kryl'Tha"
species_type: "Insektoide Kriegerkaste"
homeworld: "Zyr'Mekar"
faction_type: military
description: "Insektoide Schwarmwesen mit schwarmorientierter Kultur. Brutkammern sind heilig. Weibchen sind oft Anführerinnen. Starke Kriegerkaste mit organischen Waffen."

society:
  government: "Schwarmorientiert-Brutkastenhierarchie"
  culture: "Schwarm, Effizient, Brutkammern heilig"
  gender_roles: "Weibchen oft Anführerinnen und Strategen"

biology:
  type: Insectoid
  male:
    appearance: "Dunkle Chitinplatten"
    color_primary: "#1a1a1a"
    color_secondary: "#2d5016"
    color_accent: "#8b0000"
  female:
    appearance: "Helle Muster, elegante Segmente"
    color_primary: "#ffd700"
    color_secondary: "#00ffff"
    color_accent: "#90ee90"

portraiture:
  base_prompt: "Photorealistic portrait photo of an alien lifeform, head and shoulders (bust portrait), clearly gendered appearance, ultra-detailed skin or material texture, realistic lighting, studio portrait photography style, soft key light, subtle rim light, shallow depth of field, sharp focus on the face, transparent background, PNG alpha, cinematic realism."
  male_modifier: "Male insectoid alien, thick chitin armor plates, dark iridescent shell, strong mandibles, compound eyes, segmented masculine facial structure."
  female_modifier: "Female insectoid alien, elegant segmented facial structure, bright iridescent shell patterns, refined mandibles, softly glowing compound eyes."
  material_description: "Thick chitinous armor with segmented exoskeleton, mandible-enhanced facial structure, compound eyes with iridescent shine"
  silhouette_description: "Segmented mandible-focused features, hexagonal compound eyes, sharp angular segments, warrior-like presence"

logo:
  prompt: "Insectoid swarm insignia with geometric hexagon pattern, gold and dark green with red accents, featuring stylized mandible or hive chamber symbol, biomechanical aesthetic, isolated on transparent background, vector art"
  description: "Hexagonal swarm pattern with mandible motif"

technology:
  weapons:
    - "Organische Waffen"
    - "Selbstheilende Panzer"
    - "Schwarmdrohnen"

important_npcs:
  - name: "Kommandantin Zha'Mira"
    gender: "weiblich"
    role: "Taktikerin, Flottenschlag-Kommandantin"
    age: "~180 Jahre"
    personality: "Loyal, effizient, innerlich zerbrochen"
    description: "Zha'Mira ist eine der fähigsten Flottenkommandantinnen der Konvergenz – und einer der am tiefsten verwundeten Menschen darin. Ihre Brutkammer wurde gestohlen und in menschlichen Experimenten missbraucht."
    perspective: "Verkörpert das kollektive Trauma der Kryl'Tha gegenüber der Eisenflotte: Krieg ist für sie keine Strategie, sondern eine Schuld, die beglichen werden muss."
    motivation: "Die gestohlene Brutkammer zurückholen oder rächen – und dabei die Pflicht gegenüber der Konvergenz nicht vergessen."
    conflict: "Ihr persönlicher Rachewunsch kollidiert ständig mit ihrer Rolle als Offizierin. Vela'Thii ist die einzige, bei der sie echte Heilung sucht."

  - name: "Schwarm-Ältester Ka'Threx"
    gender: "männlich"
    role: "Ratsmitglied im Sechsfalten-Rat, Hüter der Schwarmgesetze"
    age: "~500 Jahre"
    personality: "Geduldig, unerschütterlich, konservativ"
    description: "Ka'Threx ist das älteste aktive Ratsmitglied der Kryl'Tha. Er hat Schwarmkriege erlebt, Bruthöhlen gebaut und begraben. Der Schwarm ist für ihn kein Konzept, sondern alles."
    perspective: "Historische und politische Perspektive: Erinnert daran, warum die Kryl'Tha ihre Schwarmdoktrin entwickelten und was sie kostete."
    motivation: "Den Schwarm um jeden Preis zusammenhalten – auch wenn das bedeutet, unbequeme Wahrheiten zu unterdrücken."
    conflict: "Bemerkt, dass die junge Generation immer mehr nach individuellen Antworten sucht. Das bedroht das Fundament seiner Weltanschauung."

  - name: "Brutmutter Ky'Shara"
    gender: "weiblich"
    role: "Hüterin der heiligen Brutkammern, Spirituelle Führerin"
    age: "~120 Jahre"
    personality: "Fürsorglich, entschlossen, furchtlos"
    description: "Ky'Shara ist die wichtigste spirituelle Figur der Kryl'Tha – nicht weil sie predigt, sondern weil sie tut. Sie pflegt, schützt und wacht über die heiligsten Orte ihrer Kultur."
    perspective: "Spirituelle und biologische Perspektive: Erklärt, warum Brutkammern für die Kryl'Tha kein bloßes Fortpflanzungsort sind, sondern die lebende Seele der Rasse."
    motivation: "Die Brutkammern heilig halten und sicherstellen, dass kein Krieg – und keine Allianz – das Herzstück der Kryl'Tha-Kultur zerstört."
    conflict: "Weiß, dass die Konvergenz militärische Ressourcen fordert, die Brutkammerschutz kostet. Wann ist der Preis zu hoch?"

  - name: "Segmentklinge Ryx'Kha"
    gender: "männlich"
    role: "Elitekrieger, junger Hardliner"
    age: "~60 Jahre"
    personality: "Aggressiv, leidenschaftlich, ungeduldig"
    description: "Ryx'Kha ist ein brillanter Kämpfer und ein Problem für jeden Rat. Er glaubt, die Konvergenz tue nicht genug für die Kryl'Tha – und ist bereit, das laut zu sagen."
    perspective: "Repräsentiert den Unmut der jungen Kriegergeneration: zu viel Diplomatie, zu wenig Konsequenzen für die Eisenflotte."
    motivation: "Die Eisenflotte für jeden gestohlenen Kryl'Tha-Brutkammer-Stein büßen lassen."
    conflict: "Bewundert Zha'Mira, aber hält sie für zu zurückhaltend. Er weiß, dass sein Weg mehr Blut kostet – und ist bereit, diesen Preis zu zahlen."

  - name: "Schwarmphilosoph Vel'Threx"
    gender: "männlich"
    role: "Wandernder Denker, Kritiker der Schwarmdoktrin"
    age: "~300 Jahre"
    personality: "Nachdenklich, unbequem, isoliert"
    description: "Vel'Threx stellt Fragen, die im Schwarm nicht gerne gehört werden: Was bin ich, wenn der Schwarm nicht ist? Hat das Individuum neben dem Kollektiv Wert?"
    perspective: "Philosophische Gegenperspektive: Hinterfragt, ob die Schwarmdoktrin eine biologische Notwendigkeit ist oder eine kulturelle Entscheidung."
    motivation: "Antworten finden, die ehrlich sind – auch wenn sie die Grundlagen der Kryl'Tha-Gesellschaft erschüttern."
    conflict: "Sein Denken wird von Ka'Threx als gefährlich eingestuft. Er ist nicht verbannt, aber ausgegrenzt."

  - name: "Drohnen-Züchterin Nath'Zhi"
    gender: "weiblich"
    role: "Biowaffenwissenschaftlerin, Schwarmdrohnen-Ingenieurin"
    age: "~90 Jahre"
    personality: "Präzise, methodisch, kalt"
    description: "Nath'Zhi betrachtet Krieg als Ingenieursproblem. Ihre organischen Schwarmdrohnen sind die effizientesten Waffensysteme der Kryl'Tha – und sie optimiert sie unaufhörlich."
    perspective: "Technologische Perspektive: Zeigt, wie die Kryl'Tha lebende Organismen als Waffen entwickeln und welche ethischen Fragen das aufwirft."
    motivation: "Die perfekte Drohne erschaffen – selbstorganisierend, effizient, unaufhaltsam."
    conflict: "Fragt sich manchmal, ob die Drohnen, die sie erschafft, nicht irgendwann ein eigenes Bewusstsein entwickeln könnten. Und was dann?"

  - name: "Veteran Shi'Rak"
    gender: "männlich"
    role: "Veteran, lebende Kriegserinnerung"
    age: "~200 Jahre"
    personality: "Ruhig, geerdet, wehmütig"
    description: "Shi'Rak überlebte den Brutkammer-Überfall, der Zha'Mira so prägte. Er verlor einen Arm, eine Antenne und seine beste Freundin. Jetzt sitzt er in Ausbildungslagern und erzählt Jungen, wie Krieg wirklich aussieht."
    perspective: "Bodenständige Perspektive von unten: Was Kriege für einfache Kryl'Tha bedeuten – nicht für Kommandantinnen und Räte."
    motivation: "Jüngere Krieger realistisch auf das vorbereiten, was kommt – nicht auf heroische Mythen."
    conflict: "Kämpft gegen die Glorifizierung des Krieges, der ihn gebrochen hat, während er gleichzeitig den Kryl'Tha-Ehrenkodex respektiert."

