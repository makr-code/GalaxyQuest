species_code: zhareen
display_name: "Zhareen"
species_type: "Kristalline Empathen"
homeworld: "Aeryth'Luun"
faction_type: archival
description: "Kristallorganische Lebensformen mit Archivierungsfunktion. Archivare und Bewahrer von Wissen. Perfektion durch Symmetrie. Emotionen werden in Kristallen gespeichert."

society:
  government: "Archivalistisch-Kollektiv"
  culture: "Archivierung, Perfektion, Symmetrie, Wissensbewahrung"
  gender_roles: "Gender: Kristallstruktur-Variation"

biology:
  type: Crystalline
  male:
    appearance: "Kantige Kristallformen"
    color_primary: "#0047ab"
    color_secondary: "#a9a9a9"
    color_accent: "#a9a9a9"
  female:
    appearance: "Fließende Konturen"
    color_primary: "#b76e79"
    color_secondary: "#9966cc"
    color_accent: "#f0f8ff"

portraiture:
  base_prompt: "Photorealistic portrait photo of an alien lifeform, head and shoulders (bust portrait), clearly gendered appearance, ultra-detailed skin or material texture, realistic lighting, studio portrait photography style, soft key light, subtle rim light, shallow depth of field, sharp focus on the face, transparent background, PNG alpha, cinematic realism."
  male_modifier: "Male crystalline alien, angular crystal formations, sharp facets, cold internal glow, refracted light patterns across the face."
  female_modifier: "Female crystalline alien, smooth crystal contours, warm internal glow, soft refracted light, flowing crystalline facial patterns."
  material_description: "Crystalline structure with internal luminescence, geometric facets with light refraction, smooth or angular geometry depending on gender"
  silhouette_description: "Geometric crystalline features, symmetrical patterns, glowing internal core, ethereal and precious appearance"

logo:
  prompt: "Crystalline archival insignia with geometric crystal lattice pattern, cobalt blue and rose gold with lavender accents, featuring stylized data storage or knowledge symbol, elegant mathematical aesthetic, isolated on transparent background, vector art"
  description: "Crystalline lattice with knowledge symbol"

technology:
  weapons:
    - "Kristall-Datenknoten"
    - "Lichtbrechungswaffen"
    - "Bewusstseinsspeicher"

important_npcs:
  - name: "Archivar Kaelor"
    gender: "männlich"
    role: "Hüter der Kristallarchive, Sechsfalten-Rat"
    age: "~3200 Jahre"
    personality: "Ruhig, analytisch, tief melancholisch"
    description: "Kaelor hat mehr Geschichte erlebt als jedes andere Wesen der Konvergenz. Er hat Zivilisationen kommen und gehen sehen – und muss nun zusehen, wie seine eigene von der Leerenbrut gefressen wird."
    perspective: "Verkörpert die Zhareen-Kernaufgabe und ihre Tragödie: Wissen zu bewahren ist sinnlos, wenn die Bewahrer selbst aussterben."
    motivation: "Aeryth'Luun retten oder wenigstens das Wissen daraus für die Ewigkeit sichern."
    conflict: "Fragt sich, ob ein Leben im Exil, das nur die Erinnerung an ein verlorenes Zuhause trägt, noch lebenswert ist."

  - name: "Kristall-Bewärterin Myr'Tal"
    gender: "weiblich"
    role: "Politische Kämpferin, Sechsfalten-Rat"
    age: "~800 Jahre"
    personality: "Entschlossen, brillant, schonungslos"
    description: "Myr'Tal ist nicht bereit, den Untergang der Zhareen als elegante Tragödie hinzunehmen. Sie kämpft mit jeder Ressource der Konvergenz für den Wiederaufbau von Aeryth'Luun."
    perspective: "Politische Perspektive: Zeigt, dass die Zhareen nicht nur Archivare sind, sondern auch Akteure, die ihre eigene Zukunft verteidigen."
    motivation: "Politische Unterstützung für die Rückeroberung von Aeryth'Luun gewinnen – egal welcher Preis."
    conflict: "Muss Kompromisse eingehen, die ihren eigenen Werten widersprechen. Bis wohin ist sie bereit zu gehen?"

  - name: "Bruchkristall-Seherin Ael'Ris"
    gender: "weiblich"
    role: "Orakel, Leserin verlorener Erinnerungen"
    age: "~450 Jahre"
    personality: "Visionär, erschütternd direkt, einsam"
    description: "Ael'Ris kann die gespeicherten Erinnerungen in zerbrochenen Kristallen lesen – auch wenn sie beschädigt, leerenbrutverseucht oder fragmentiert sind. Sie sieht, was andere nicht sehen wollen."
    perspective: "Historische und prophetische Perspektive: Verbindet die Vergangenheit der Zhareen mit dem, was die Leerenbrut wirklich mit Aeryth'Luun gemacht hat."
    motivation: "Die Wahrheit über den Untergang von Aeryth'Luun dokumentieren – auch die Teile, die andere lieber vergessen würden."
    conflict: "Hat in leerenbrutverseuchten Kristallen Erinnerungen von der Leerenbrut selbst gelesen. Sie versteht sie ein wenig. Das macht ihr Angst."

  - name: "Jungarchivar Tael'Kaan"
    gender: "männlich"
    role: "Nachwuchsarchivar, Rekonstruktionsprojekt-Leiter"
    age: "~50 Jahre"
    personality: "Optimistisch, fleißig, manchmal naiv"
    description: "Tael'Kaan ist jung genug, um Hoffnung zu haben. Er leitet ein Projekt zur digitalen Rekonstruktion verlorener Kristallarchive aus Fragmenten und Zeugenberichten."
    perspective: "Perspektive der Zukunft: Zeigt, dass es trotz aller Verluste eine Generation gibt, die die Zhareen weiterbauen will."
    motivation: "Aeryth'Luun nicht als Verlust, sondern als Startpunkt begreifen. Aus den Trümmern etwas Neues errichten."
    conflict: "Kaelor sieht seinen Optimismus manchmal als Unwissenheit. Tael'Kaan fragt sich, ob Kaelors Trauer manchmal auch eine Form von Kapitulation ist."

  - name: "Splittermagier Veth'Zar"
    gender: "männlich"
    role: "Krieger, Zerbrochenes-als-Waffe-Spezialist"
    age: "~200 Jahre"
    personality: "Verbittert, präzise, gefährlich"
    description: "Veth'Zar hat akzeptiert, dass Aeryth'Luun verloren ist. Er hat aus dieser Akzeptanz eine Waffe gemacht: buchstäblich, indem er kristalline Splitter zu tödlichen Projektilen formt."
    perspective: "Dunkle Innenperspektive: Zeigt die Zhareen, die das Trauma anders verarbeiten – nicht durch Bewahrung, sondern durch Vergeltung."
    motivation: "Die Leerenbrut nicht retten wollen, sondern vernichten. Für jeden Kristall, den sie gefressen hat."
    conflict: "Myr'Tal und Kaelor halten seinen Ansatz für kontraproduktiv. Er hält ihre für sentimentalen Selbstbetrug."

  - name: "Erinnerungshüterin Lirel'Shan"
    gender: "weiblich"
    role: "Bewusstseinsarchivarin, Trägerin verstorbener Seelen"
    age: "~1200 Jahre"
    personality: "Ruhig, überwältigend weise, fast nicht mehr präsent"
    description: "Lirel'Shan trägt in ihren Kristallstrukturen die gespeicherten Bewusstseine von über tausend verstorbenen Zhareen. Sie ist gleichzeitig eine Person und eine wandelnde Bibliothek."
    perspective: "Existenzielle Perspektive: Was bedeutet Individualität, wenn man Träger Tausender anderer Persönlichkeiten ist? Und was bedeutet der Tod bei den Zhareen wirklich?"
    motivation: "Sicherstellen, dass die Seelen, die sie trägt, irgendwann in neuen Körpern oder Kristallen weiterleben können."
    conflict: "Die Stimmen in ihr werden lauter. Manchmal ist sie sich nicht sicher, wessen Gedanken die eigenen sind."

  - name: "Exilierter Kael'Murr"
    gender: "männlich"
    role: "Gedächtnisloser, Zhareen ohne Geschichte"
    age: "~100 Jahre"
    personality: "Leicht, unbeschwert, gesellschaftlich ausgestoßen"
    description: "Kael'Murr hat eine radikale Entscheidung getroffen: Er ließ seine gespeicherten Erinnerungskristalle löschen. Er lebt ohne die Last der kollektiven Zhareen-Trauer – und ist dafür aus der Gesellschaft ausgestoßen."
    perspective: "Radikale Gegenperspektive: Stellt die Frage, ob das Bewahren von Trauma eine Tugend oder eine Krankheit ist."
    motivation: "Zeigen, dass ein Zhareen ohne Geschichte existieren kann – und vielleicht sogar freier ist."
    conflict: "Vermisst nichts, was er nicht mehr kennt. Aber manchmal sieht er Kaelors Augen und fragt sich, was er darin vergessen hat."

