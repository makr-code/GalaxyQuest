species_code: vor_tak
display_name: "Vor'Tak"
species_type: "Reptiloide Krieger und Strategen"
homeworld: "Drak'Thuun"
faction_type: military
description: "Reptiloide Strategen mit starker hierarchischer Struktur. Ehre, Disziplin und Stärke prägen ihre Kultur. Männer dominieren das Militär, während Frauen Diplomatie und Strategie lenken."

society:
  government: "Hierarchisch-Militärisch"
  culture: "Ehre, Disziplin, Stärke"
  gender_roles: "Männer: Militär | Frauen: Diplomatie & Strategie"

biology:
  type: Reptilian
  male:
    appearance: "Dunkle Schuppen, massive Knochenplatten"
    color_primary: "#1a4d2e"
    color_secondary: "#0d0d0d"
    color_accent: "#8b6914"
  female:
    appearance: "Farbintensiv, leuchtende Muster"
    color_primary: "#27ae60"
    color_secondary: "#00ffff"
    color_accent: "#ffd700"

portraiture:
  base_prompt: "Photorealistic portrait photo of an alien lifeform, head and shoulders (bust portrait), clearly gendered appearance, ultra-detailed skin or material texture, realistic lighting, studio portrait photography style, soft key light, subtle rim light, shallow depth of field, sharp focus on the face, transparent background, PNG alpha, cinematic realism."
  male_modifier: "Male reptilian alien, massive bone plates, dark green-black scales, broad masculine facial structure, battle scars, subtle bronze armor details."
  female_modifier: "Female reptilian alien, sleek emerald scales, golden highlights, elegant feminine bone ridges, piercing yellow eyes, refined facial structure."
  material_description: "Scaly reptilian skin with exposed bone plates, bronze undertones in armor plating"
  silhouette_description: "Broad-shouldered, angular jaw, prominent brow ridge, fierce predatory expression"

logo:
  prompt: "Hexagonal military insignia for reptilian alien species, dark green and bronze colors, featuring a stylized bone plate symbol, sharp angular lines, menacing and disciplined aesthetic, metallic finish, isolated on transparent background, vector art style"
  description: "Military hexagon with bone-plate symbol"

technology:
  weapons:
    - "Organisch-metallische Panzerungen"
    - "Lebendes Metall"
    - "Schockwellen-Waffen"

important_npcs:
  - name: "General Drak'Mol"
    gender: "männlich"
    role: "Oberbefehlshaber des Schildzirkels, Sechsfalten-Rat"
    age: "~320 Jahre"
    personality: "Ehrenhaft, misstrauisch, dogmatisch"
    description: "Oberster Militärkommandant der Vor'Tak und Anführer des Schildzirkels. Über drei Jahrhunderte Kriegsdienst haben ihm unerschütterliche Überzeugungen gegeben – aber auch blinde Flecken."
    perspective: "Verkörpert die militärische Seele der Vor'Tak: Ehre als absoluter Wert, Stärke als einzige Sprache, die Feinde verstehen."
    motivation: "Die Konvergenz um jeden Preis schützen – wenn nötig durch Krieg, niemals durch Kapitulation."
    conflict: "Spürt, dass militärische Stärke allein die Allianz nicht retten kann, aber sein gesamtes Weltbild beruht darauf."

  - name: "Stratega T'Asha"
    gender: "weiblich"
    role: "Diplomatische Strategin, Sechsfalten-Rat"
    age: "~190 Jahre"
    personality: "Scharfsinnig, geduldig, pragmatisch"
    description: "T'Asha sitzt als zweites Vor'Tak-Mitglied im Sechsfalten-Rat und vertritt die strategisch-diplomatische Linie ihrer Rasse. Sie führt, wo Drak'Mol zerstört."
    perspective: "Beleuchtet die weibliche Führungsrolle in der Vor'Tak-Gesellschaft: Frauen lenken Diplomatie und große Strategie, während Männer die Front halten."
    motivation: "Einen dauerhaften Frieden erhandeln, der der Vor'Tak Stärke und nicht Schwäche signalisiert."
    conflict: "Ringt täglich damit, Kompromisse einzugehen, ohne das Vor'Tak-Konzept von Ehre zu verraten."

  - name: "Veteran Dar'Kruun"
    gender: "männlich"
    role: "Lebende Chronik, Ehrenwächter der Ahnen"
    age: "~420 Jahre"
    personality: "Weise, melancholisch, unerschütterlich"
    description: "Dar'Kruun hat mehr Kriege überlebt als die meisten Vor'Tak Lebenszyklen gezählt haben. Seine Schuppen tragen Narben aus sechs großen Konflikten."
    perspective: "Historische Perspektive auf 400 Jahre Vor'Tak-Geschichte: vom Krieg der Segmente über die Nebelkriege bis zur Bedrohung durch die Eisenflotte."
    motivation: "Sicherstellen, dass die Fehler vergangener Generationen nicht wiederholt werden – auch wenn niemand zuhören will."
    conflict: "Weiß, dass der Ehrenkodex in seiner heutigen Form erst nach großen Niederlagen konstruiert wurde – und hütet dieses Wissen als Bürde."

  - name: "Thal'Muk"
    gender: "männlich"
    role: "Junger Frontsoldat, Schuppenwache"
    age: "~25 Jahre"
    personality: "Idealistisch, verängstigt, suchend"
    description: "Thal'Muk trat begeistert in die Schuppenwache ein – und sah in seinem ersten Einsatz gegen die Leerenbrut, wie Kameraden einfach ausgelöscht wurden. Ehrenkodex und Realität klaffen für ihn auseinander."
    perspective: "Stimme der jüngsten Generation: Repräsentiert die Frage, ob der überlieferte Ehrenkodex im Angesicht einer kosmischen Bedrohung noch Sinn ergibt."
    motivation: "Einen Weg finden, tapfer zu sein, ohne das eigene Leben und das seiner Kameraden sinnlos zu opfern."
    conflict: "Das Eingestehen von Angst gilt bei den Vor'Tak als Schande – aber er hat Angst, und er weiß es."

  - name: "Seherin Vran'Keth"
    gender: "weiblich"
    role: "Mystikerin, Traumdeuterin des Ahnenhains"
    age: "~150 Jahre"
    personality: "Visionär, ruhig, unbeugsam"
    description: "In einer Kultur, die Stärke über alles stellt, ist Vran'Keth eine Anomalie: eine Seherin, deren Prophezeiungen die Militärführung beunruhigen, weil sie sich bewahrheiten."
    perspective: "Spirituelle Gegenströmung innerhalb der militärischen Vor'Tak-Gesellschaft; beleuchtet, dass Ehre auch Demut bedeuten kann."
    motivation: "Die Vor'Tak vor einem Krieg bewahren, den sie laut ihrer Visionen nicht gewinnen können."
    conflict: "Muss ihre Prophezeiungen so formulieren, dass Drak'Mol und der Schildzirkel sie nicht als Schwächlichkeit abtun."

  - name: "Schmiedelehrmeisterin Yara'Bona"
    gender: "weiblich"
    role: "Meisterin des Lebenden Metalls, Technik-Hüterin"
    age: "~230 Jahre"
    personality: "Erdverbunden, pragmatisch, stolz"
    description: "Yara'Bona ist die führende Expertin für organisch-metallische Legierungen – die Waffentechnologie, die den Vor'Tak ihre militärische Überlegenheit sichert."
    perspective: "Technologische Perspektive: Die Vor'Tak-Stärke wurzelt in ihrer einzigartigen Fähigkeit, Metall wie ein lebendes Werkzeug zu formen."
    motivation: "Das Wissen über lebendes Metall weitergeben und weiterentwickeln, damit zukünftige Generationen gerüstet sind."
    conflict: "Beobachtet, dass das Militär ihre Technologie ausschließlich als Waffe begreift – nicht als die Kunst, die sie für sie ist."

  - name: "Exil Drak'Vael"
    gender: "männlich"
    role: "Deserteur, ehemaliger Vor'Tak-Offizier"
    age: "~180 Jahre"
    personality: "Verbittert, desillusioniert, ehrlich bis zur Selbstzerstörung"
    description: "Drak'Vael lief zur Eisenflotte über – nicht aus Verrat, sondern weil er glaubte, die Konvergenz sei zum Scheitern verurteilt. Er lebt jetzt in einem Zwischenreich aus Schuld und Pragmatismus."
    perspective: "Außenperspektive auf die Vor'Tak: Zeigt die Risse im Ehrenkodex und die Grenzen einer Gesellschaft, die Stärke verabsolutiert."
    motivation: "Überleben – und im Stillen hoffen, dass er sich irrte."
    conflict: "Weiß, dass sein Übergang zur Eisenflotte nach Vor'Tak-Recht todeswürdig ist, und vermisst trotzdem sein Volk."

